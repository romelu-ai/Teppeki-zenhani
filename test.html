<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>テスト</title>
<style>
body { font-family: sans-serif; padding: 20px; background: #111; color: #fff; }
#log { margin-top: 20px; padding: 10px; background: #222; min-height: 100px; font-size: 13px; white-space: pre-wrap; }
label { display: inline-block; padding: 12px 24px; background: yellow; color: #000; font-size: 16px; cursor: pointer; margin-top: 10px; }
input[type=file] { display: none; }
img { max-width: 100%; margin-top: 10px; display: block; }
</style>
</head>
<body>
<h2>画像選択テスト</h2>
<label for="fi">ファイルを選ぶ</label>
<input type="file" id="fi" accept="image/*">
<img id="out" alt="">
<div id="log">ログ：ここに結果が出ます</div>
<script>
var log = document.getElementById('log');
function addLog(msg) { log.textContent += '\n' + msg; }

addLog(‘JS読み込み完了’);
addLog(’UA: ’ + navigator.userAgent.substring(0,80));

document.getElementById(‘fi’).addEventListener(‘change’, function(){
addLog(‘changeイベント発火’);
var file = this.files[0];
if (!file) { addLog(‘ファイルなし’); return; }
addLog(’ファイル名: ’ + file.name);
addLog(‘サイズ: ’ + file.size + ’ bytes’);
addLog(’タイプ: ’ + file.type);

var reader = new FileReader();
reader.onload = function(e) {
addLog(‘FileReader完了’);
document.getElementById(‘out’).src = e.target.result;
addLog(‘imgにセット完了’);
};
reader.onerror = function(e) { addLog(’FileReaderエラー: ’ + e); };
reader.readAsDataURL(file);
});
</script>

</body>
</html>
